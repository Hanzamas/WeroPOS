<body>
<div id="app">
  <header class="header" id="topbar"><b id="shopTitle">WeroPOS</b><button class="btn sm ghost" id="lockBtn">🔒</button></header>
  <div id="page" class="scr"></div>
  <nav class="bnav" id="bnav"></nav>
</div>
<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet"><div class="handle"></div><div class="sheet-h"><b id="sheetTitle"></b><button class="btn sm ghost" onclick="closeSheet()">✕</button></div><div class="sheet-b" id="sheetBody"></div><div class="sheet-f" id="sheetFoot"></div></div>
<div id="toasts"></div>
<div id="lockScreen" style="display:none;position:fixed;inset:0;z-index:100;background:var(--bg);align-items:center;justify-content:center;padding:20px">
  <div class="card" style="width:100%;max-width:320px;text-align:center"><h3>Masuk POS</h3><p class="muted" style="margin-top:6px">PIN / Passkey / Voice</p>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px"><input id="pinInput" class="i" type="password" inputmode="numeric" placeholder="PIN 4-6 digit"/><div class="grid2"><button class="btn primary full" id="pinOk">Buka</button><button class="btn ghost full" id="passkeyBtn">Passkey</button></div><button class="btn ghost full" id="voiceAuthBtn">🎙️ Suara</button><div id="lockMsg" class="err-txt"></div></div>
  </div>
</div>
<script type="module" src="src/app.js"></script>
